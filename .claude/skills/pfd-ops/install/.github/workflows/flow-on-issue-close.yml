name: flow on issue close

on:
  issues:
    types: [closed]

concurrency:
  group: flow-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply flow sync (audit --fix)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/audit-issues-flow.mjs --fix || true

      - name: Normalize blank lines in roadmap.pfdsl
        run: node scripts/normalize-pfdsl.mjs || true

      - name: Regenerate golden snapshot (roadmap.pfdsl drives core format golden)
        run: pnpm --filter @pfdsl/core exec vitest run -u || true

      - name: Open PR if roadmap.pfdsl changed
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            .pfdsl/roadmap.pfdsl
            packages/core/src/__snapshots__/index.test.ts.snap
          branch: flow-sync/pending
          commit-message: "chore(plan): sync flow after #${{ github.event.issue.number }} closed"
          title: "chore(plan): sync flow (pending closed issues)"
          body: |
            Mechanical `.pfdsl/roadmap.pfdsl` sync (`audit-issues-flow.mjs --fix`). Triggered by close of issue #${{ github.event.issue.number }}.

            Terminal chains are removed (artifact + sole producing process + edge); processes with remaining downstream outputs only have their `tags`/`updated_at` issue-tracking fields cleared (the `iN_` prefix on the process is permanent). Review and merge if correct.
