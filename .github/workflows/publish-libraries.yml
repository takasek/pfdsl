name: Publish libraries to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "@pfdsl/core" build

      - run: pnpm --filter "@pfdsl/core" test

      - run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/core

  publish-graphviz-exporter:
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "@pfdsl/graphviz-exporter..." build

      - run: pnpm --filter "@pfdsl/graphviz-exporter" test

      - run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/graphviz-exporter

  publish-preview-engine:
    runs-on: ubuntu-latest
    needs: [publish-core, publish-graphviz-exporter]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "@pfdsl/preview-engine..." build

      - run: pnpm --filter "@pfdsl/preview-engine" test

      - run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/preview-engine
