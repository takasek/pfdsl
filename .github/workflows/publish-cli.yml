name: Publish CLI to npm

on:
  push:
    tags:
      - 'v*'
  # Manual fallback: tag pushes occasionally fail to trigger this workflow.
  # Dispatch from the branch/ref whose packages/cli/package.json version
  # should be published (e.g. main).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "@pfdsl/cli..." build

      - run: pnpm --filter "@pfdsl/cli..." test

      - run: npm publish --provenance --access public
        working-directory: packages/cli
