name: Publish CLI to npm

on:
  push:
    tags:
      - 'v[0-9]*'
  # Manual fallback: tag pushes occasionally fail to trigger this workflow.
  # Dispatch from the branch/ref whose packages/cli/package.json version
  # should be published (e.g. main).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # .claude/skills/pfdsl is generated + gitignored (#348) and absent on a
      # fresh checkout — bootstrap it before building for publish (a plain
      # 'pnpm --filter cli... build' would otherwise fail at the CLI's
      # onSuccess bundling step).
      - run: make bootstrap-pfdsl-skill

      - run: pnpm --filter "@pfdsl/cli..." build

      - run: pnpm --filter "@pfdsl/cli..." test

      - run: npm publish --provenance --access public
        working-directory: packages/cli
