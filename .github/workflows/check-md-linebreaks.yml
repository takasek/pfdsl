name: check md linebreaks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check for mid-sentence line breaks in markdown
        run: node scripts/check-md-linebreaks.mjs
