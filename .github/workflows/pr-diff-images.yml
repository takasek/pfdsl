name: pr diff images

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  attach-diff-images:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find changed .pfdsl files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.merge_commit_sha }}"
          FILES=$(git diff --name-only "$BASE" "$HEAD" -- '*.pfdsl' | paste -sd, -)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Install @pfdsl/cli
        if: steps.changed.outputs.files != ''
        run: npm install -g @pfdsl/cli

      - name: Generate before/after SVGs
        if: steps.changed.outputs.files != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-pr-diff-images.mjs generate

      - name: Commit SVG artifacts
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/
          if ! git diff --cached --quiet; then
            git commit -m "docs(diagrams): add pfdsl diff images for PR #${{ github.event.pull_request.number }} [skip ci]"
            git push
          fi

      - name: Update PR description
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-pr-diff-images.mjs update-pr
