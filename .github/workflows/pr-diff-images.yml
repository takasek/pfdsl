name: pr diff images

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  attach-diff-images:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: pr-diff-images
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Find changed .pfdsl files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.merge_commit_sha }}"
          {
            echo 'files<<PFDSL_EOF'
            git diff --name-only "$BASE" "$HEAD" -- '*.pfdsl'
            echo 'PFDSL_EOF'
          } >> $GITHUB_OUTPUT

      - name: Install @pfdsl/cli
        if: steps.changed.outputs.files != ''
        run: npm install -g @pfdsl/cli

      - name: Generate before/after/diff SVGs
        id: generate
        if: steps.changed.outputs.files != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: node scripts/generate-pr-diff-images.mjs generate

      - name: Push SVG artifacts to ci-image-store
        if: success() && steps.generate.outputs.has_svgs == 'true'
        env:
          DIAGRAMS_REPO_TOKEN: ${{ secrets.DIAGRAMS_REPO_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git clone --depth=1 "https://x-access-token:${DIAGRAMS_REPO_TOKEN}@github.com/takasek/ci-image-store.git" /tmp/ci-image-store
          mkdir -p "/tmp/ci-image-store/pfdsl/pr-${PR_NUMBER}"
          cp -r "docs/diagrams/pr-${PR_NUMBER}/." "/tmp/ci-image-store/pfdsl/pr-${PR_NUMBER}/"
          cd /tmp/ci-image-store
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "pfdsl/pr-${PR_NUMBER}"
          if ! git diff --cached --quiet; then
            git commit -m "pfdsl: add diff images for pfdsl PR #${PR_NUMBER}"
            git push origin HEAD
          fi

      - name: Update PR description
        if: success() && steps.generate.outputs.has_svgs == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: node scripts/generate-pr-diff-images.mjs update-pr
