name: check gen-skill identity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gen-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Regenerate skill dirs and assert no drift
        run: |
          make gen-skill
          if ! git diff --exit-code .claude/skills/pfdsl skills/pfdsl; then
            echo ""
            echo "ERROR: skill dirs are stale. Run 'make gen-skill' and commit the result."
            exit 1
          fi
          echo "gen-skill identity in sync."
