name: check pfd-ops install sync

on:
  push:
    paths:
      - '.claude/skills/pfd-ops/install/**'
      - '.github/workflows/**'
      - 'scripts/**'
  pull_request:
    paths:
      - '.claude/skills/pfd-ops/install/**'
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check pfd-ops/install in sync with deployed locations
        run: |
          fail=0

          # Each file under install/ must match the file at the same relative path from repo root
          while IFS= read -r src; do
            rel="${src#.claude/skills/pfd-ops/install/}"
            dst="$rel"
            if [ ! -f "$dst" ]; then
              echo "MISSING: $dst (canonical: $src)"
              fail=1
            elif ! diff_out=$(diff "$src" "$dst" 2>&1); then
              echo "OUT OF SYNC: $dst differs from canonical $src"
              echo "$diff_out"
              fail=1
            fi
          done < <(find .claude/skills/pfd-ops/install -type f | sort)

          if [ $fail -ne 0 ]; then
            echo ""
            echo "Fix: edit the canonical under .claude/skills/pfd-ops/install/ and copy to the matching repo path (or vice-versa — keep both in sync)."
            exit 1
          fi
          echo "All pfd-ops install files in sync."
