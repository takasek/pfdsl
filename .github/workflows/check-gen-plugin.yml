name: check gen-plugin identity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gen-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # .claude/skills/pfdsl is generated + gitignored (#348), so it doesn't exist
      # on a fresh checkout yet — bootstrap-pfdsl-skill builds once, generates it,
      # then rebuilds so the CLI bundle picks it up (see Makefile comment).
      - run: make bootstrap-pfdsl-skill

      - name: Regenerate plugin dir and assert no drift
        run: |
          make gen-plugin
          if ! git diff --exit-code plugin; then
            echo ""
            echo "ERROR: plugin/pfdsl is stale (this also catches a plugin.json version left behind"
            echo "after a CLI release — its version is derived from packages/cli/package.json)."
            echo "Run 'make gen-plugin' and commit the result."
            exit 1
          fi
          echo "gen-plugin identity in sync."
