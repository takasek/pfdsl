name: flow on issue close

on:
  issues:
    types: [closed]

concurrency:
  group: flow-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.claude/skills/pfd-ops/actions/flow-sync
        with:
          issue-number: ${{ github.event.issue.number }}
          token: ${{ github.token }}
