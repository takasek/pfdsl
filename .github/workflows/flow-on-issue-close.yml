name: flow on issue close

on:
  issues:
    types: [closed]

concurrency:
  group: flow-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply flow sync (audit --fix)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/audit-issues-flow.mjs --fix || true

      - name: Open PR if plan.pfdsl changed
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: .pfdsl/plan.pfdsl
          branch: flow-sync/pending
          commit-message: "chore(plan): sync flow after #${{ github.event.issue.number }} closed"
          title: "chore(plan): sync flow (pending closed issues)"
          body: |
            Mechanical `.pfdsl/plan.pfdsl` sync (`audit-issues-flow.mjs --fix`). Triggered by close of issue #${{ github.event.issue.number }}.

            Terminal chains are removed (artifact + sole producing process + edge); artifacts with remaining downstream are demoted by stripping the `iN_` prefix. Review and merge if correct.
