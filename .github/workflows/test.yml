name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: make lint

      # .claude/skills/pfdsl is generated + gitignored (#348) and absent on a
      # fresh checkout — bootstrap it before the plain 'pnpm -r build' below
      # (which would otherwise fail at the CLI's onSuccess bundling step).
      - run: make bootstrap-pfdsl-skill

      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

      - run: make check-docs

      - run: make check-readme-cli

      - name: Verify snapshots are up-to-date with .pfdsl files
        run: |
          pnpm --filter @pfdsl/core exec vitest run -u
          git diff --exit-code packages/core/src/__snapshots__/
