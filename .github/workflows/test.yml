name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: make lint

      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

      - run: make check-docs

      - name: Verify snapshots are up-to-date with .pfdsl files
        run: |
          pnpm --filter @pfdsl/core exec vitest run -u
          git diff --exit-code packages/core/src/__snapshots__/
